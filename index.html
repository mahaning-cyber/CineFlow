<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineFlow AI</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
}

button{
    padding:12px 20px;
    background:#00c853;
    border:none;
    color:white;
    cursor:pointer;
}

pre{
    text-align:left;
    background:#000;
    padding:10px;
    border-radius:8px;
    overflow:auto;
}
</style>

</head>

<body>

<div class="container">

<h2>CineFlow AI</h2>

<input id="text" placeholder="Enter your idea..." />
<br>
<button onclick="generate()">Generate</button>

<pre id="output"></pre>

</div>

<script>
async function generate(){
    let text = document.getElementById("text").value;

    let res = await fetch("YOUR_BACKEND_URL/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    document.getElementById("output").innerText =
    "SCRIPT:\n" + data.script + "\n\n" +
    "MEME:\n" + data.meme + "\n\n" +
    "CAPTION:\n" + data.caption + "\n\n" +
    "HASHTAGS:\n" + data.hashtags;
}
</script>

</body>
</html>
