<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineFlow | Pro Movie Engine</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #121212;
            --accent: #00ff88; /* ಪ್ರೊಫೆಷನಲ್ ಗ್ರೀನ್ */
            --border: #252525;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation - ಫೋನ್‌ನಲ್ಲಿ ನೀಟಾಗಿ ಕಾಣಲು */
        header { 
            height: 50px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
        }

        .brand { font-weight: 900; color: var(--accent); letter-spacing: 2px; font-size: 18px; }

        /* Workspace Setup */
        #workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; /* ಫೋನ್‌ಗಾಗಿ ವರ್ಟಿಕಲ್ ಲೇಔಟ್ */
        }

        /* ದೊಡ್ಡ ಸಿನಿಮಾ ಸ್ಕ್ರೀನ್ (The Stage) */
        #monitor { 
            flex: 2; 
            background: #050505; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px solid #111;
            margin: 5px;
            border-radius: 8px;
            overflow: hidden;
        }

        #video-canvas {
            width: 90%;
            aspect-ratio: 16/9;
            background: #000;
            box-shadow: 0 0 30px rgba(0,255,136,0.1);
            position: relative;
        }

        /* ಪ್ರೊಫೆಷನಲ್ ಟೂಲ್ ಬಾಕ್ಸ್ (FL Studio Style) */
        #controls { 
            flex: 1; 
            background: var(--panel); 
            padding: 15px; 
            border-top: 1px solid var(--border);
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .control-unit { background: #1a1a1a; padding: 10px; border-radius: 5px; border: 1px solid #222; }
        label { display: block; font-size: 10px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        
        input[type=range] { width: 100%; accent-color: var(--accent); }

        /* Timeline - ಸಿನಿಮಾದ ಉದ್ದ ಅಳೆಯಲು */
        #timeline {
            height: 80px;
            background: #0a0a0a;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
        }

        .track-block { height: 40px; background: #1a1a1a; border: 1px solid var(--accent); flex: 1; border-radius: 3px; position: relative; }
        .track-block::after { content: 'CLIP 01'; position: absolute; font-size: 8px; color: var(--accent); top: 15px; left: 10px; }

        /* ದೊಡ್ಡ ಆಪ್ಶನ್ ಬಟನ್ */
        .render-now {
            grid-column: span 2;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">CINEFLOW PRO</div>
    <div style="font-size: 10px; background: #222; padding: 4px 8px; border-radius: 3px;">4K ENGINE</div>
</header>

<div id="workspace">
    <div id="monitor">
        <div id="video-canvas">
            <div id="actor" style="width: 50px; height: 50px; background: var(--accent); position: absolute; top: 20%; left: 20%; border-radius: 50%; cursor: move; box-shadow: 0 0 15px var(--accent);"></div>
        </div>
        <div style="position: absolute; top: 10px; left: 10px; font-size: 10px; color: #333;">MASTER MONITOR - 24FPS</div>
    </div>

    <div id="controls">
        <div class="control-unit">
            <label>Master Exposure</label>
            <input type="range" id="exp">
        </div>
        <div class="control-unit">
            <label>Color Grade</label>
            <input type="range" id="grade">
        </div>
        <div class="control-unit">
            <label>VFX Intensity</label>
            <input type="range" id="vfx">
        </div>
        <div class="control-unit">
            <label>Layer Depth</label>
            <input type="range" id="depth">
        </div>
        <button class="render-now">Start 8K Render</button>
    </div>
</div>

<div id="timeline">
    <div style="font-size: 10px; color: #444; width: 40px;">00:00</div>
    <div class="track-block"></div>
    <div class="track-block" style="border-color: #555;"></div>
</div>

<script>
    // ಫೋನ್‌ನಲ್ಲಿ ಟಚ್ ಮಾಡಿ ಮೂವ್ ಮಾಡುವ ಫೀಚರ್ (Touch Support)
    const actor = document.getElementById('actor');
    let isDragging = false;

    function move(e) {
        if (!isDragging) return;
        let x = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
        let y = (e.type === 'touchmove') ? e.touches[0].clientY : e.clientY;
        
        actor.style.left = (x - 25) + 'px';
        actor.style.top = (y - 70) + 'px';
    }

    actor.addEventListener('mousedown', () => isDragging = true);
    actor.addEventListener('touchstart', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchend', () => isDragging = false);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move);
</script>

</body>
</html>
