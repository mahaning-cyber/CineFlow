<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineFlow AI Studio</title>

<style>
body{
    font-family: Arial;
    background:#0f0f0f;
    color:#fff;
    margin:0;
    padding:0;
}

.header{
    background:#1f1f1f;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:5px;
    border:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00c853;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}

pre{
    white-space:pre-wrap;
    background:#000;
    padding:10px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
CineFlow AI Studio
</div>

<div class="container">

<div class="card">

<h3>ನಿನ್ನ ಕಥೆ ಬರೆಯು</h3>

<input id="text" placeholder="ಉದಾ: ಗ್ರಾಮದ ಹುಡುಗ ಸ್ಟಾರ್ ಆಗ್ತಾನೆ" />

<button onclick="generate()">Create Story</button>

</div>

<div class="card">
<pre id="output">Output ಇಲ್ಲಿ ಕಾಣಿಸುತ್ತದೆ...</pre>
</div>

</div>

<script>
async function generate(){

    let text = document.getElementById("text").value;

    let res = await fetch("YOUR_BACKEND_URL/generate", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    document.getElementById("output").innerText =
"📜 STORY:\n" + data.script + "\n\n" +
"🎭 MEME IDEA:\n" + data.meme + "\n\n" +
"📱 CAPTION:\n" + data.caption + "\n\n" +
"🔥 HASHTAGS:\n" + data.hashtags;
}
</script>

</body>
</html>
