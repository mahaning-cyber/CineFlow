<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VillageMind AI - Global Video Generator</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 20px; font-size: 16px; }
        button { background: #38bdf8; color: #0f172a; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #videoResult { margin-top: 30px; display: none; }
        img { width: 100%; border-radius: 10px; border: 2px solid #38bdf8; }
        .footer { margin-top: 50px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>VillageMind AI</h1>
    <p>Generate Next-Gen Videos for Free</p>
    
    <input type="text" id="promptInput" placeholder="Describe your video (e.g. Space exploration)">
    <br>
    <button onclick="generateVideo()">Generate Global Video</button>

    <div id="videoResult">
        <h3>Your AI Generation:</h3>
        <img id="outputImage" src="" alt="AI Video Frame">
        <p>Status: <span style="color: #4ade80;">Success!</span></p>
    </div>
</div>

<div class="footer">
    Created by a Village Visionary | Powered by Distributed Global API
</div>

<script>
    function generateVideo() {
        const prompt = document.getElementById('promptInput').value;
        if(!prompt) { alert("Please type something!"); return; }
        
        const seed = Math.floor(Math.random() * 100000);
        // ನಾವು ಕಂಡುಹಿಡಿದ ಹೊಸ ಉಚಿತ API ಲಿಂಕ್
        const videoUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=video`;
        
        document.getElementById('outputImage').src = videoUrl;
        document.getElementById('videoResult').style.display = 'block';
    }
</script>

</body>
</html>
