<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow | Professional Video Creator</title>
    <style>
        /* Modern Cinematic Look */
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Standard Header */
        header { 
            background: var(--panel-bg); 
            padding: 15px 25px; 
            border-bottom: 1px solid #333; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; letter-spacing: 4px; color: var(--accent); font-size: 1.2rem; }
        .tagline { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        /* Main Workspace */
        #main-editor {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Preview Area - Standard Cinematic Screen */
        #preview-canvas {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 10px solid #111;
        }

        .actor-asset {
            width: 180px;
            cursor: grab;
            position: absolute;
            transition: box-shadow 0.3s;
            z-index: 10;
        }

        .actor-asset:active { cursor: grabbing; border: 2px solid var(--accent); }

        /* Professional Sidebar Controls */
        #sidebar {
            width: 320px;
            background: var(--panel-bg);
            border-left: 1px solid #333;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .control-box { display: flex; flex-direction: column; gap: 10px; }
        h3 { font-size: 12px; color: var(--text-dim); margin: 0; letter-spacing: 1px; }

        input[type=range] {
            width: 100%;
            height: 5px;
            background: #333;
            border-radius: 5px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Standard Bottom Timeline */
        #timeline {
            height: 120px;
            background: #111;
            border-top: 1px solid #333;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .track { background: #222; height: 50px; flex: 1; border-radius: 4px; border: 1px dashed #444; }
        
        .render-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .render-btn:hover { transform: scale(1.02); background: #00dce6; }
    </style>
</head>
<body>

<header>
    <div class="logo">CINEFLOW</div>
    <div class="tagline">Full-Length Video Creator</div>
</header>

<div id="main-editor">
    <div id="preview-canvas">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="actor-asset" id="actor" draggable="false">
        <div style="position: absolute; bottom: 20px; color: #444; font-size: 12px;">STAGE VIEW (16:9)</div>
    </div>

    <div id="sidebar">
        <div class="control-box">
            <h3>EXPOSURE</h3>
            <input type="range" id="bright" min="50" max="150" value="100">
        </div>
        <div class="control-box">
            <h3>SATURATION</h3>
            <input type="range" id="sat" min="0" max="200" value="100">
        </div>
        <div class="control-box">
            <h3>CINEMATIC TINT</h3>
            <input type="range" id="tint" min="0" max="100" value="0">
        </div>
        <button class="render-btn">EXPORT PROJECT</button>
    </div>
</div>

<div id="timeline">
    <div style="color: var(--text-dim); font-size: 11px; width: 100px;">TIMELINE</div>
    <div class="track"></div>
</div>

<script>
    const actor = document.getElementById('actor');
    let isMoving = false;
    let offset = { x: 0, y: 0 };

    // Standard Movement Engine
    actor.addEventListener('mousedown', (e) => {
        isMoving = true;
        offset.x = e.clientX - actor.offsetLeft;
        offset.y = e.clientY - actor.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isMoving) return;
        actor.style.left = (e.clientX - offset.x) + 'px';
        actor.style.top = (e.clientY - offset.y) + 'px';
    });

    document.addEventListener('mouseup', () => isMoving = false);

    // Filters Engine
    const b = document.getElementById('bright');
    const s = document.getElementById('sat');
    const t = document.getElementById('tint');

    function apply() {
        actor.style.filter = `brightness(${b.value}%) saturate(${s.value}%) grayscale(${t.value}%)`;
    }

    [b, s, t].forEach(input => input.addEventListener('input', apply));
</script>

</body>
                </html>
